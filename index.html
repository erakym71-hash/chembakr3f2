    <script>
        const quizData = [
            // 1
            {
                question: `عنصر من السلسلة الانتقالية الأولى، أحد مركباته يستخدم في الأصباغ.<br>أي الاختيارات التالية يعبر عن التركيب الإلكتروني لأيون هذا العنصر في هذا المركب ؟`,
                options: [
                    "<span dir='ltr'>[Ar] 4s<sup>1</sup> 3d<sup>5</sup></span>",
                    "<span dir='ltr'>[Ar] 3d<sup>3</sup></span>",
                    "<span dir='ltr'>[Ar] 4s<sup>2</sup> 3d<sup>3</sup></span>",
                    "<span dir='ltr'>[Ar] 3d<sup>2</sup></span>"
                ],
                correctAnswer: 1,
                explanation: `<p>العنصر الذي يستخدم أحد مركباته في الأصباغ هو الكروم (مركب أكسيد الكروم الثلاثي Cr₂O₃ يستخدم في عمل الأصباغ الخضراء). الكروم توزيعه الشاذ هو [Ar] 4s¹ 3d⁵. في مركب Cr₂O₃ يكون عدد تأكسد الكروم +3، وبالتالي يفقد إلكترون الـ 4s وإلكترونين من الـ 3d، فيصبح تركيبه الأيوني [Ar] 3d³.</p>`,
                optionsExplanation: [
                    "هذا التوزيع يمثل ذرة الكروم المتعادلة وليس الأيون.",
                    "إجابة صحيحة، يمثل أيون الكروم الثلاثي Cr⁺³.",
                    "توزيع غير صحيح للأيون المطلوب.",
                    "توزيع غير صحيح في حالة التأكسد."
                ]
            },
            // 2
            {
                question: `أي مما يلي يعبر عن التوزيع الإلكتروني لأيون عنصر <strong>غير انتقالي</strong> ؟`,
                options: [
                    "<span dir='ltr'>X<sup>3+</sup> : [Ne] 3s<sup>2</sup> 3p<sup>6</sup></span>",
                    "<span dir='ltr'>Y<sup>2+</sup> : [Ar] 3d<sup>6</sup></span>",
                    "<span dir='ltr'>Z<sup>2+</sup> : [Ne] 3s<sup>2</sup> 3p<sup>6</sup></span>",
                    "<span dir='ltr'>W<sup>3+</sup> : [Kr] 4d<sup>7</sup></span>"
                ],
                correctAnswer: 2,
                explanation: `<p>فكرة السؤال تعتمد على حساب العدد الذري للعنصر من خلال أيونه لمعرفة نوعه.<br>
                - الأيون X³⁺ توزيعه ينتهي بـ 3p⁶ (وهو نفس توزيع غاز الأرجون 18). إذن العدد الذري للعنصر X = 18 + 3 = 21. هذا هو <strong>السكانديوم (Sc)</strong>، وهو عنصر انتقالي.<br>
                - الأيون Z²⁺ توزيعه ينتهي بـ 3p⁶ (أرجون 18). إذن العدد الذري للعنصر Z = 18 + 2 = 20. هذا هو <strong>الكالسيوم (Ca)</strong>، وهو عنصر ممثل (غير انتقالي).<br>
                إذن، Z هو العنصر غير الانتقالي.</p>`,
                optionsExplanation: [
                    "يمثل أيون السكانديوم (Sc=21) وهو عنصر انتقالي.",
                    "يحتوي على 3d⁶ فهو أيون لعنصر انتقالي (كالحديد الثنائي).",
                    "إجابة صحيحة ومخادعة! يمثل أيون الكالسيوم (Ca=20) وهو عنصر غير انتقالي.",
                    "يحتوي على 4d⁷ فهو أيون لعنصر انتقالي في السلسلة الثانية."
                ]
            },
            // 3
            {
                question: `أربعة أنابيب اختبار، يحتوي كل منها على محلول ملح كما بالجدول التالي:<br>
                <div class="overflow-x-auto my-4 w-full max-w-xl mx-auto">
                    <table class="w-full text-center border-collapse border-2 border-gray-300">
                        <thead><tr class="bg-gray-100"><th class="border border-gray-300 p-2">W</th><th class="border border-gray-300 p-2">Z</th><th class="border border-gray-300 p-2">Y</th><th class="border border-gray-300 p-2">X</th></tr></thead>
                        <tbody><tr><td class="border border-gray-300 p-2" dir="ltr">V(NO<sub>3</sub>)<sub>5</sub></td><td class="border border-gray-300 p-2" dir="ltr">Ti(NO<sub>3</sub>)<sub>3</sub></td><td class="border border-gray-300 p-2" dir="ltr">Fe(NO<sub>3</sub>)<sub>2</sub></td><td class="border border-gray-300 p-2" dir="ltr">Mn(NO<sub>3</sub>)<sub>2</sub></td></tr></tbody>
                    </table>
                </div>
                أي هذه الأنابيب يجب تغطيتها حتى لا يتغير تركيب المحلول بداخلها ؟`,
                options: [
                    "W",
                    "Z",
                    "Y",
                    "X"
                ],
                correctAnswer: 2,
                explanation: `<p>الأنبوبة التي يجب تغطيتها (منع تعرضها للهواء) هي التي تحتوي على مادة سهلة التأكسد. محلول نترات الحديد الثنائي Y (Fe(NO₃)₂) يتأكسد بسهولة في الهواء إلى نترات الحديد الثلاثي الأكثر استقراراً (حيث 3d⁵ نصف ممتلئ). لذلك يجب حمايته من الهواء.</p>`,
                optionsExplanation: [
                    "الفاناديوم الخماسي مستقر ولا يتأكسد بسهولة.",
                    "التيتانيوم الثلاثي أقل عرضة للتأكسد السريع مقارنة بالحديد الثنائي.",
                    "إجابة صحيحة، الحديد الثنائي يتأكسد بسهولة جداً للحديد الثلاثي المستقر.",
                    "المنجنيز الثنائي (3d⁵) مستقر جداً ويصعب أكسدته للثلاثي."
                ]
            },
            // 4
            {
                question: `عنصران انتقاليان متتاليان Y , X من السلسلة الانتقالية الأولى ويحتويان نفس عدد الإلكترونات في المستوى الفرعي 3d.<br>أي مما يلي يُعد صحيحا ؟`,
                options: [
                    "شحنة النواة الفعالة للعنصر X أكبر من شحنة النواة الفعالة للعنصر Y",
                    "نصف قطر العنصر X أصغر من نصف قطر العنصر Y",
                    "نصف قطر العنصر X يساوي تقريباً نصف قطر العنصر Y",
                    "التنافر بين إلكترونات 3d للعنصر X أقل من التنافر بين إلكترونات 3d للعنصر Y"
                ],
                correctAnswer: 2,
                explanation: `<p>العنصران المتتاليان اللذان يمتلكان نفس عدد إلكترونات 3d هما الكروم Cr (4s¹ 3d⁵) والمنجنيز Mn (4s² 3d⁵). وبما أنهما متتاليان في السلسلة الانتقالية الأولى، فإن نصف القطر الذري لهما يكون متقارباً جداً (يكاد يكون متساوياً) بسبب الثبات النسبي لنصف القطر من الكروم إلى النحاس.</p>`,
                optionsExplanation: [
                    "خطأ، شحنة النواة الفعالة تزداد بزيادة العدد الذري.",
                    "خطأ، أنصاف الأقطار متقاربة جداً في هذه المنطقة.",
                    "إجابة صحيحة، يتميز الجزء من الكروم للنحاس بثبات نسبي في نصف القطر.",
                    "خطأ، كلاهما يمتلك نفس العدد من إلكترونات 3d."
                ]
            },
            // 5
            {
                question: `أي مما يلى يعبر عن التغير الحادث لخام السيدريت عند تسخينه في الهواء؟`,
                options: [
                    "تزداد كتلته وتزداد فيه نسبة الحديد",
                    "تقل كتلته وتزداد فيه نسبة الحديد",
                    "تقل كتلته وتقل فيه نسبة الحديد",
                    "تزداد كتلته وتقل فيه نسبة الحديد"

                const textarea = document.getElementById(`essay-answer-${currentQuestionIndex}`);
                if (!textarea || textarea.value.trim() === '' || questionStatus[currentQuestionIndex] !== 'unanswered') return;
                
                userSelectedAnswers[currentQuestionIndex] = textarea.value;
                score++; // نعطي الطالب درجة على محاولته في السؤال المقالي
                questionStatus[currentQuestionIndex] = 'correct';
                playSuccessSound();
                triggerConfetti();
                
            } else {
                const selectedOption = document.querySelector('input[name="option"]:checked');
                if (!selectedOption || questionStatus[currentQuestionIndex] !== 'unanswered') return;

                const selectedIndex = parseInt(selectedOption.value);
                userSelectedAnswers[currentQuestionIndex] = selectedIndex;

                if (selectedIndex === q.correctAnswer) {
                    score++;
                    questionStatus[currentQuestionIndex] = 'correct';
                    playSuccessSound();
                    triggerConfetti();
                } else {
                    questionStatus[currentQuestionIndex] = 'wrong';
                    playErrorSound();
                }
            }

            loadQuestion();
            setTimeout(() => explanationContainer.classList.add('show'), 100);
        }

        function toggleExplanation() {
            explanationContainer.classList.toggle('show');
        }

        function nextQuestion() {
            if (currentQuestionIndex < totalQuestions - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                const unansweredCount = questionStatus.filter(s => s === 'unanswered').length;
                if (unansweredCount > 0) {
                    alert(`يتبقى لك ${unansweredCount} سؤال لم تجب عليها. راجع القائمة الجانبية.`);
                } else {
                    showResults();
                }
            }
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.querySelector('.w-full.md\\:w-1\\/4').classList.add('hidden');
            const resultContainer = document.getElementById('result-container');
            resultContainer.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('total-score').innerText = totalQuestions;
            progressBar.style.width = `100%`;

            const percentage = (score / totalQuestions) * 100;
            const messageEl = document.getElementById('motivational-message');
            
            if (percentage >= 90) {
                messageEl.className = "text-xl font-black p-8 rounded-2xl mb-10 w-full max-w-2xl leading-relaxed bg-green-100 text-green-800 border-2 border-green-300 shadow-lg";
                messageEl.innerHTML = `<i class="fa-solid fa-crown text-5xl mb-4 block text-green-600"></i>ممتاز جداً يا بطل! مستواك يدل على فهم عميق لمادة الكيمياء. استمر على هذا الأداء الراقي!`;
                triggerConfetti();
                setTimeout(triggerConfetti, 1000);
            } else if (percentage >= 70) {
                messageEl.className = "text-xl font-bold p-8 rounded-2xl mb-10 w-full max-w-2xl leading-relaxed bg-blue-100 text-blue-800 border-2 border-blue-300 shadow-lg";
                messageEl.innerHTML = `<i class="fa-solid fa-thumbs-up text-5xl mb-4 block text-blue-600"></i>أداء جيد جداً! أنت على الطريق الصحيح، فقط راجع الأخطاء البسيطة.`;
            } else if (percentage >= 50) {
                messageEl.className = "text-xl font-bold p-8 rounded-2xl mb-10 w-full max-w-2xl leading-relaxed bg-yellow-100 text-yellow-800 border-2 border-yellow-300 shadow-lg";
                messageEl.innerHTML = `<i class="fa-solid fa-person-running text-5xl mb-4 block text-yellow-600"></i>مجهود طيب، لكنك تحتاج لتركيز أكبر في التفاصيل وقراءة المخططات. لا تيأس، اقرأ الشروحات بدقة.`;
            } else {
                messageEl.className = "text-xl font-bold p-8 rounded-2xl mb-10 w-full max-w-2xl leading-relaxed bg-red-100 text-red-800 border-2 border-red-300 shadow-lg";
                messageEl.innerHTML = `<i class="fa-solid fa-book-open text-5xl mb-4 block text-red-600"></i>هذه ليست نهايتك، إنها نقطة البداية الحقيقية! يبدو أنك تحتاج إلى مراجعة الأساسيات مرة أخرى بهدوء.`;
            }
        }

        loadQuestion();
    </script>
</body>
</html>
